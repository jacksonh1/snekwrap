name: snekwrap
channels:
  - conda-forge
dependencies:
  - flake8
  - isort
  - pip
  - typer
  - loguru
  - tqdm
  - ipython
  - jupyterlab
  - matplotlib
  - seaborn
  - notebook
  - numpy<2
  - pandas
  - biopython>=1.80
  - scikit-learn
  - jupytext
  - biotite==1.4.0
  - nglview
  - pip:
    - hatch
    - hatchling
    - python-dotenv
    - py3Dmol
    - graphein
    - biopandas
    - mkdocs
    - bioemu
    - -e .
